<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Llumière Sangwa</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div>
            <a href="index.HTML">Mon Portfolio</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.HTML">Accueil</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="passions.html">Passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contact.html" class="active">Contact</a></li> 
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contactez-moi</h2>
            <p class="contact-intro">Un projet en tête ou une question ? Parlons-en !</p>

            <div class="contact-container">
                <div class="contact-form">
                    <form action="#">
                        <div class="form-group">
                            <label for="name">Nom complet</label>
                            <input type="text" id="name" placeholder="Votre nom" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="votre@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" rows="5" placeholder="Votre message ici..." required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Envoyer le message</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h3>Mes coordonnées</h3>
                    
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <p>Lubumbashi, RD Congo</p>
                    </div>

                    <a href="https://wa.me/243977778045" target="_blank" class="info-link-item">
                        <i class="fa-brands fa-whatsapp" style="color: #25D366;"></i>
                        <p>+243 977 778 045</p>
                    </a>

                    <div class="social-links-contact">
                        <h3>Suivez mon travail</h3>
                        <div class="social-icons">
                            <a href="https://www.instagram.com/lles.graphix?igsh=MWt5Z3E3MnYzaXk3Zg%3D%3D&utm_source=qr" target="_blank">
                                <i class="fa-brands fa-instagram"></i>
                            </a>
                            <a href="#"><i class="fa-brands fa-github"></i></a>
                            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tous droits réservés</p>
        <div>
            <a href=""><i class="fa-brands fa-github"></i></a>
            <a href=""><i class="fa-brands fa-x-twitter"></i></a>
            <a href=""><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </footer>
</body>
</html>
